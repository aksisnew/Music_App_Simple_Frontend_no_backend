<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Music Player</title>
    <style>
       
    </style>
</head>
<body>

    <div class="player-card">
        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('now-playing')">Player</button>
            <button class="tab-btn" onclick="showTab('playlist')">Playlist</button>
        </nav>

        <div class="content">
            <!-- Now Playing Tab -->
            <div id="now-playing" class="tab-content active">
                <div class="art-box" id="art-container">
                    <img id="track-art" src="pathto" alt="Art">
                </div>
                
                <div class="song-info">
                    <div id="track-name" class="song-title">Select a Song</div>
                    <div id="track-artist" class="song-artist">No artist</div>
                </div>

                <div class="progress-container">
                    <input type="range" id="progress-bar" min="0" max="100" value="0" onchange="seekTo()">
                    <div class="time-info">
                        <span id="current-time">0:00</span>
                        <span id="total-duration">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn" onclick="prevTrack()">⏮</button>
                    <button class="btn btn-main" id="play-pause" onclick="togglePlay()">▶</button>
                    <button class="btn" onclick="nextTrack()">⏭</button>
                </div>
            </div>

            <!-- Playlist Tab -->
            <div id="playlist" class="tab-content">
                <ul class="playlist-list" id="playlist-container">
                    <!-- Items injected by JS -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Track Data (Replace URLs with your own music files)
        const trackList = [
            {
                name: "unknown",
                artist: "unknown",
                image: "pathto",
                path: "path.mp3"
            },
            {
                name: "unknown",
                artist: "unknown",
                image: "pathto",
                path: "path.mp3"
            },
            {
                name: "unknown",
                artist: "unknown",
                image: "pathto",
                path: "path.mp3"
            }
        ];

        let trackIndex = 0;
        let isPlaying = false;
        let updateTimer;

        // Create audio element
        const curr_track = document.createElement('audio');

        // Selectors
        const trackArt = document.getElementById('track-art');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playPauseBtn = document.getElementById('play-pause');
        const progressBar = document.getElementById('progress-bar');
        const currTime = document.getElementById('current-time');
        const totalDuration = document.getElementById('total-duration');
        const playlistContainer = document.getElementById('playlist-container');
        const artContainer = document.getElementById('art-container');

        // Initialize
        function loadTrack(index) {
            clearInterval(updateTimer);
            resetValues();

            curr_track.src = trackList[index].path;
            curr_track.load();

            trackArt.src = trackList[index].image;
            trackName.textContent = trackList[index].name;
            trackArtist.textContent = trackList[index].artist;

            updateTimer = setInterval(updateProgress, 1000);
            curr_track.addEventListener('ended', nextTrack);
            
            updatePlaylistUI();
        }

        function resetValues() {
            currTime.textContent = "0:00";
            totalDuration.textContent = "0:00";
            progressBar.value = 0;
        }

        function togglePlay() {
            if (!isPlaying) playTrack();
            else pauseTrack();
        }

        function playTrack() {
            curr_track.play();
            isPlaying = true;
            playPauseBtn.textContent = "⏸";
            artContainer.classList.add('playing');
        }

        function pauseTrack() {
            curr_track.pause();
            isPlaying = false;
            playPauseBtn.textContent = "▶";
            artContainer.classList.remove('playing');
        }

        function nextTrack() {
            trackIndex = (trackIndex + 1) % trackList.length;
            loadTrack(trackIndex);
            playTrack();
        }

        function prevTrack() {
            trackIndex = (trackIndex - 1 + trackList.length) % trackList.length;
            loadTrack(trackIndex);
            playTrack();
        }

        function seekTo() {
            let seekto = curr_track.duration * (progressBar.value / 100);
            curr_track.currentTime = seekto;
        }

        function updateProgress() {
            if (!isNaN(curr_track.duration)) {
                let seekPosition = curr_track.currentTime * (100 / curr_track.duration);
                progressBar.value = seekPosition;

                let currentMins = Math.floor(curr_track.currentTime / 60);
                let currentSecs = Math.floor(curr_track.currentTime - currentMins * 60);
                let durationMins = Math.floor(curr_track.duration / 60);
                let durationSecs = Math.floor(curr_track.duration - durationMins * 60);

                if (currentSecs < 10) currentSecs = "0" + currentSecs;
                if (durationSecs < 10) durationSecs = "0" + durationSecs;

                currTime.textContent = currentMins + ":" + currentSecs;
                totalDuration.textContent = durationMins + ":" + durationSecs;
            }
        }

        // Tab Switching Logic
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Playlist UI Generation
        function updatePlaylistUI() {
            playlistContainer.innerHTML = "";
            trackList.forEach((track, index) => {
                let li = document.createElement('li');
                li.className = `playlist-item ${index === trackIndex ? 'active' : ''}`;
                li.innerHTML = `
                    <div class="item-info">
                        <div class="item-title">${track.name}</div>
                        <div class="item-artist">${track.artist}</div>
                    </div>
                    <span>${index === trackIndex && isPlaying ? '🔊' : ''}</span>
                `;
                li.onclick = () => {
                    trackIndex = index;
                    loadTrack(index);
                    playTrack();
                    showTab('now-playing');
                    // Update header tab button styling manually if needed
                    document.querySelectorAll('.tab-btn')[0].click();
                };
                playlistContainer.appendChild(li);
            });
        }

        // Load the first track on startup
        loadTrack(trackIndex);
    </script>
</body>
</html>
